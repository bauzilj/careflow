<div class="space-y-6">

  <!-- HEADER -->
  <div class="flex flex-col md:flex-row md:items-center md:justify-between gap-4">

    <div>
      <h1 class="text-3xl font-bold text-gray-900">Usuários</h1>
      <p class="text-gray-500 mt-1">
        Gerencie os usuários do sistema CareFlow
      </p>
    </div>

    <button
      (click)="openModal()"
      class="bg-blue-600 text-white px-5 py-2.5 rounded-lg shadow hover:bg-blue-700 transition">
      + Adicionar Usuário
    </button>

  </div>

  <!-- FILTERS -->
  <div class="flex flex-col md:flex-row gap-3">

    <!-- SEARCH -->
    <input
      [ngModel]="search"
      (ngModelChange)="searchChanged.next($event)"
      placeholder="Buscar por nome ou email..."
      class="w-full border p-3 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none"
    />

    <!-- ROLE FILTER -->
    <select
      [(ngModel)]="roleFilter"
      class="w-full md:w-60 border p-3 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">

      <option value="">Todos os perfis</option>
      <option value="Admin">Admin</option>
      <option value="Médico">Médico</option>
      <option value="Recepção">Recepção</option>

    </select>

  </div>

  <!-- LOADING -->
  <div *ngIf="isLoading" class="space-y-3">
    <div class="h-10 bg-gray-200 animate-pulse rounded"></div>
    <div class="h-10 bg-gray-200 animate-pulse rounded"></div>
    <div class="h-10 bg-gray-200 animate-pulse rounded"></div>
  </div>

  <!-- TABLE -->
  <div *ngIf="!isLoading" class="bg-white border rounded-2xl shadow-sm overflow-hidden">

    <table class="w-full text-sm">

      <thead class="bg-gray-50 text-gray-600 text-xs uppercase">
        <tr>
          <th class="px-6 py-4 text-left">Usuário</th>
          <th class="px-6 py-4 text-left">Email</th>
          <th class="px-6 py-4 text-left">Perfil</th>
          <th class="px-6 py-4 text-right">Ações</th>
        </tr>
      </thead>

      <tbody class="divide-y">

        <tr
          *ngFor="let user of paginatedUsers"
          class="hover:bg-gray-50 transition">

          <!-- USER -->
          <td class="px-6 py-4 flex items-center gap-3">

            <div class="w-9 h-9 rounded-full bg-blue-600 text-white flex items-center justify-center font-bold">
              {{ user.name.charAt(0).toUpperCase() }}
            </div>

            <span class="font-medium text-gray-900">
              {{ user.name }}
            </span>

          </td>

          <!-- EMAIL -->
          <td class="px-6 py-4 text-gray-600">
            {{ user.email }}
          </td>

          <!-- ROLE -->
          <td class="px-6 py-4">
            <span class="px-3 py-1 text-xs rounded-full font-semibold bg-blue-50 text-blue-700">
              {{ user.role }}
            </span>
          </td>

          <!-- ACTIONS -->
          <td class="px-6 py-4 text-right space-x-2">

            <button
              (click)="editUser(user)"
              class="px-3 py-1 rounded-lg bg-gray-100 hover:bg-gray-200 transition">
              Editar
            </button>

            <button
              (click)="deleteUser(user.id)"
              class="px-3 py-1 rounded-lg bg-red-50 text-red-600 hover:bg-red-100 transition">
              Excluir
            </button>

          </td>

        </tr>

      </tbody>

    </table>

    <!-- EMPTY STATE -->
    <div *ngIf="filteredUsers.length === 0" class="p-10 text-center text-gray-500">
      Nenhum usuário encontrado 😕
    </div>

  </div>

  <!-- PAGINATION -->
  <div class="flex justify-between items-center">

    <button
      (click)="page = page - 1"
      [disabled]="page === 1"
      class="px-4 py-2 bg-gray-200 rounded-lg disabled:opacity-50">
      Anterior
    </button>

    <span class="text-sm text-gray-600">
      Página {{ page }}
    </span>

    <button
      (click)="page = page + 1"
      [disabled]="page * pageSize >= filteredUsers.length"
      class="px-4 py-2 bg-gray-200 rounded-lg disabled:opacity-50">
      Próxima
    </button>

  </div>

</div>

<!-- MODAL -->
<div
  *ngIf="showModal"
  class="fixed inset-0 bg-black/50 backdrop-blur-sm flex items-center justify-center z-50">

  <div class="bg-white w-full max-w-md rounded-2xl shadow-xl p-6 space-y-4">

    <h2 class="text-xl font-bold text-gray-900">
      {{ selectedUser ? 'Editar Usuário' : 'Novo Usuário' }}
    </h2>

    <input
      [(ngModel)]="form.name"
      placeholder="Nome"
      class="w-full border p-3 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none" />

    <input
      [(ngModel)]="form.email"
      placeholder="Email"
      class="w-full border p-3 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none" />

    <input
      [(ngModel)]="form.password"
      type="password"
      placeholder="Senha"
      class="w-full border p-3 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none" />

    <select
      [(ngModel)]="form.role"
      class="w-full border p-3 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">

      <option value="Admin">Admin</option>
      <option value="Médico">Médico</option>
      <option value="Recepção">Recepção</option>

    </select>

    <!-- ACTIONS -->
    <div class="flex justify-end gap-3">

      <button
        (click)="closeModal()"
        class="px-4 py-2 bg-gray-200 rounded-lg hover:bg-gray-300 transition">
        Cancelar
      </button>

      <button
        (click)="saveUser()"
        class="px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition">
        Salvar
      </button>

    </div>

  </div>

</div>
